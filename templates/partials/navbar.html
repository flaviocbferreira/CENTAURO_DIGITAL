<!-- Navbar global incluida por base.html em todas as paginas internas e de login. -->
<header class="fixed inset-x-0 top-0 z-40 border-b border-slate-200/80 bg-white/95 shadow-sm backdrop-blur">
    <nav class="mx-auto flex min-h-16 w-full max-w-[95rem] flex-col gap-3 px-4 py-3 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8">
        <div class="flex min-w-0 items-center justify-between gap-4">
            <a href="{% url 'dashboard' %}" class="flex min-w-0 items-center gap-3">
                <span class="grid h-10 w-10 shrink-0 place-items-center rounded bg-brand-700 text-sm font-bold text-white shadow-sm">CD</span>
                <span class="min-w-0">
                    <span class="block truncate text-sm font-semibold uppercase tracking-wide text-slate-950">
                        CENTAURO Digital
                    </span>
                    <span class="hidden text-xs font-medium text-slate-500 sm:block">
                        Painel geral operacional
                    </span>
                </span>
            </a>
        </div>

        <div class="flex min-w-0 flex-1 items-center gap-3 lg:justify-end">
            <div class="flex min-w-0 items-center gap-1 overflow-x-auto rounded border border-slate-200 bg-slate-50 p-1">
            <!-- request.resolver_match informa a rota atual; isso permite destacar o item ativo do menu. -->
            <a href="{% url 'dashboard' %}" class="whitespace-nowrap rounded px-3 py-2 text-sm font-semibold transition {% if request.resolver_match.url_name == 'dashboard' %}bg-white text-brand-700 shadow-sm{% else %}text-slate-700 hover:bg-white hover:text-brand-700 hover:shadow-sm{% endif %}">
                Dashboard
            </a>
            <a href="{% url 'separacao:list' %}" class="whitespace-nowrap rounded px-3 py-2 text-sm font-semibold transition {% if request.resolver_match.namespace == 'separacao' %}bg-white text-brand-700 shadow-sm{% else %}text-slate-700 hover:bg-white hover:text-brand-700 hover:shadow-sm{% endif %}">
                Separacao
            </a>
            <a href="{% url 'auditoria' %}" class="whitespace-nowrap rounded px-3 py-2 text-sm font-semibold transition {% if request.resolver_match.url_name == 'auditoria' %}bg-white text-brand-700 shadow-sm{% else %}text-slate-700 hover:bg-white hover:text-brand-700 hover:shadow-sm{% endif %}">
                Auditoria
            </a>
            <a href="{% url 'admin:index' %}" class="whitespace-nowrap rounded px-3 py-2 text-sm font-semibold transition {% if request.resolver_match.namespace == 'admin' %}bg-white text-brand-700 shadow-sm{% else %}text-slate-700 hover:bg-white hover:text-brand-700 hover:shadow-sm{% endif %}">
                Administracao
            </a>
            </div>

            <div class="hidden h-8 w-px bg-slate-200 lg:block"></div>

            <div class="flex shrink-0 items-center gap-3">
                <!-- request.user vem do context processor de auth e indica se ha usuario logado. -->
                {% if request.user.is_authenticated %}
                    <div class="hidden text-right sm:block">
                        <p class="max-w-36 truncate text-sm font-semibold text-slate-900">{{ request.user.get_full_name|default:request.user.username }}</p>
                        <p class="text-xs text-slate-500">Usuario logado</p>
                    </div>
                    <a href="{% url 'accounts:logout' %}" class="whitespace-nowrap rounded border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 hover:text-brand-700">
                        Sair
                    </a>
                {% else %}
                    <a href="{% url 'accounts:login' %}" class="whitespace-nowrap rounded bg-brand-700 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-brand-900">
                        Entrar
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>
</header>
