<article class="rounded-lg border border-slate-200 bg-white p-5 shadow-premium">
    <div class="flex items-start justify-between gap-4">
        <div>
            <p class="text-sm font-medium text-slate-500">{{ card_label }}</p>
            <h3 class="mt-2 text-2xl font-semibold text-slate-950">{{ card_value }}</h3>
        </div>
        <span class="rounded bg-brand-50 px-2.5 py-1 text-xs font-semibold text-brand-700">
            {{ card_status }}
        </span>
    </div>
    <p class="mt-4 text-sm leading-6 text-slate-600">{{ card_description }}</p>
</article>
