<section class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-premium">
    <div class="border-b border-slate-200 px-5 py-4">
        <h2 class="text-base font-semibold text-slate-950">{{ table_title }}</h2>
        <p class="mt-1 text-sm text-slate-500">{{ table_description }}</p>
    </div>
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-200 text-sm">
            <thead class="bg-slate-50">
                <tr>
                    {% for header in table_headers %}
                        <th scope="col" class="px-5 py-3 text-left font-semibold text-slate-600">
                            {{ header }}
                        </th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 bg-white">
                {% for row in table_rows %}
                    <tr class="hover:bg-slate-50">
                        {% for cell in row %}
                            <td class="whitespace-nowrap px-5 py-4 text-slate-700">{{ cell }}</td>
                        {% endfor %}
                    </tr>
                {% empty %}
                    <tr>
                        <td colspan="{{ table_headers|length }}" class="px-5 py-8 text-center text-slate-500">
                            Nenhum registro encontrado.
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
